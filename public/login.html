<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET DOS DJs | Login</title>

  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="./css/header-footer.css">
  <link rel="stylesheet" href="./css/login.css">
  <link rel="icon" href="./assets/imgs/thee/dj-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="header">
    <div class="container">
      <img class="logo-header" src="./assets/imgs/thee/logo-set.png" alt="">
      <ul class="navbar">
        <li><a href="index.html">História</a></li>
        <li><a href="cultura.html">Cultura</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="cadastro.html">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <!-- Login -->
  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="form-area">
      <h1 class="titulo-login">FAÇA LOGIN</h1>

      <div class="formulario">
        <input id="email_input" type="text" placeholder="e-mail" />
        <input id="senha_input" type="password" placeholder="senha" />

        <button class="botao" onclick="entrar()">ENTRAR</button>
      </div>

      <p class="link-cadastro">não tem conta? - <a href="cadastro.html">cadastre-se</a></p>

      <div id="div_aguardar" class="loading-div">
        <img src="./assets/circle-loading.gif" id="loading-gif" />
      </div>
      <div id="div_erros_login"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="container">
      <img class="img-fotter" src="./assets/imgs/thee/set-estrela.png" alt="Logo Set dos DJs">
      <h4>&copy; 2026 Set dos DJ's – Esther Santos</h4>
      <div-links>
        <img src="./assets/icon/pasta-icon.png" class="img-icon" alt="pasta-icon">
        <p>LINKS DE ACESSO</p>
        <li><a href="index.html">HOME</a></li>
        <li><a href="interacoes.html">INTERAÇÕES</a></li>
        <li><a href="login.html">LOGIN</a></li>
        <li><a href="cadastro.html">CADASTRO</a></li>
      </div-links>
    </div>
  </div>

</body>

<script>
  function entrar() {
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;

    if (emailVar == "" || senhaVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos.";
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar
      })
    })
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(json => {
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome;
            sessionStorage.ID_USUARIO = json.id;

            setTimeout(function () {
              window.location = "index.html";
            }, 1000);
          });
        } else {
          resposta.text().then(texto => {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "E-mail ou senha inválidos.";
          });
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>

</html>
