<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET DOS DJs | Cadastro</title>

  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="./css/header-footer.css">
  <link rel="stylesheet" href="./css/cadastro.css">
  <link rel="icon" href="./assets/imgs/thee/dj-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="header">
    <div class="container">
      <img class="logo-header" src="./assets/imgs/thee/logo-set.png" alt="">
      <ul class="navbar">
        <li><a href="index.html">História</a></li>
        <li><a href="cultura.html">Cultura</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="cadastro.html">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="form-area">
      <h1 class="titulo-cadastro">CADASTRO</h1>

      <div class="formulario">
        <input id="nome_input" type="text" placeholder="Nome completo" />

        <input id="dtNasc_input" type="date"  placeholder="Data de Nascimento"/>

        <input id="email_input" type="text" placeholder="E-mail: meuemail@provedor.com" />

        <input id="ipt_img_usuario" type="file" accept="image/*" placeholder="Selecione uma foto de perfil" />

        <input id="senha_input" type="password" placeholder="Senha: ******" />

        <input id="confirmacao_senha_input" type="password" placeholder="Confirmar senha: ******" />

        <button class="botao" onclick="cadastrar()">PRÓXIMO...</button>
      </div>

      <p class="link-login">Já tem cadastro? <a href="login.html">Faça login</a></p>

      <div id="div_aguardar" class="loading-div" style="display: none;">
        <img src="./assets/circle-loading.gif" id="loading-gif" />
      </div>
      <div id="div_erros_login"></div>
    </div>
  </div>

  <div class="footer">
    <div class="container">
      <img class="img-fotter" src="./assets/imgs/thee/set-estrela.png" alt="Logo Set dos DJs">
      <h4>&copy; 2026 Set dos DJ's – Esther Santos</h4>
      <div class="div-links">
        <img src="./assets/icon/pasta-icon.png" class="img-icon" alt="pasta-icon">
        <p>LINKS DE ACESSO</p>
        <li><a href="index.html">HOME</a></li>
        <li><a href="interacoes.html">INTERAÇÕES</a></li>
        <li><a href="login.html">LOGIN</a></li>
        <li><a href="cadastro.html">CADASTRO</a></li>
      </div>
    </div>
  </div>

</body>

<script>
  function cadastrar() {
    const nomeVar = nome_input.value;
    const dtNascVar = dtNasc_input.value;
    const emailVar = email_input.value;
    const senhaVar = senha_input.value;
    const confirmacaoVar = confirmacao_senha_input.value;
    const foto = document.getElementById('ipt_img_usuario');

    if (nomeVar == "" || dtNascVar == "" || emailVar == "" || senhaVar == "" || confirmacaoVar == "") {
      alert("Por favor, preencha todos os campos.");
      return false;
    }

    if (senhaVar !== confirmacaoVar) {
      alert("As senhas não coincidem!");
      return false;
    }

    if (foto.files.length == 0) {
      alert("Por favor, selecione uma foto de perfil.");
      return false;
    }
    const formData = new FormData();
    formData.append("nomeServer", nomeVar);
    formData.append("dtNascServer", dtNascVar);
    formData.append("emailServer", emailVar);
    formData.append("senhaServer", senhaVar);
    formData.append("fotoPerfil", foto.files[0]);

    fetch("/usuarios/cadastrar", {
      method: "POST",
      body: formData
    })
      .then(resposta => {
        if (resposta.ok) {
          alert("Cadastro realizado com sucesso! Redirecionando para o login...");
          window.location = "login.html";
        } else {
          alert("Erro ao realizar o cadastro. Verifique os dados ou se o e-mail já existe.");
        }
      })
      .catch(erro => {
        console.error(`#ERRO: ${erro}`);
      });

    return false;
  }
</script>
</html>
