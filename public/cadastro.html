<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET DOS DJs | Cadastro</title>

  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="./css/header-footer.css">
  <link rel="stylesheet" href="./css/cadastro.css">
  <link rel="icon" href="./assets/imgs/thee/dj-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="header">
    <div class="container">
      <img class="logo-header" src="./assets/imgs/thee/logo-set.png" alt="Logo">
      <ul class="navbar">
        <li><a href="index.html">História</a></li>
        <li><a href="cultura.html">Cultura</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="cadastro.html">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <main class="login-section">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="container-cadastro">
      <div class="form-area">
        <h1 class="titulo-cadastro">CADASTRO</h1>
        <div class="formulario">
          <div class="preview-container">
            <label for="ipt_img_usuario">
              <img id="img_preview" src="./assets/icon/upload-icon.png" alt="Preview">
              <p class="legenda-foto">Sua foto</p>
            </label>
          </div>

          <input id="nome_input" type="text" placeholder="Nome completo" />
          <input id="dtNasc_input" type="date" placeholder="Data de Nascimento" />
          <input id="email_input" type="text" placeholder="E-mail: meuemail@provedor.com" />

          <input id="ipt_img_usuario" type="file" accept="image/*" style="display: none;"
            onchange="exibirPreview(event)" />
          <select id="estiloMusical_input" class="select-estilo">
            <option value="" disabled selected>Seu estilo musical favorito</option>

            <optgroup label="Música Eletrônica">
              <option value="Techno">Techno (Hard, Melodic, Peak Time)</option>
              <option value="House">House (Deep, Tech, Afro House)</option>
              <option value="EDM / Big Room">EDM / Big Room</option>
              <option value="Eletro / Electro House">Eletro / Electro House</option>
              <option value="Psytrance / Trance">Psytrance / Trance</option>
              <option value="Drum and Bass">Drum and Bass</option>
              <option value="Nu Disco / Indie Dance">Nu Disco / Indie Dance</option>
            </optgroup>

            <optgroup label="Cena Urbana & Funk">
              <option value="Funk Rave / Mandelão">Funk Rave / Mandelão</option>
              <option value="Funk Carioca / 150bpm">Funk Carioca / 150bpm</option>
              <option value="Trap / Hip Hop">Trap / Hip Hop</option>
              <option value="Reggaeton / Dancehall">Reggaeton / Dancehall</option>
            </optgroup>

            <optgroup label="Pop & Hits">
              <option value="Pop Nacional">Pop Nacional</option>
              <option value="Pop Internacional">Pop Internacional</option>
              <option value="Flashback (70s, 80s, 90s)">Flashback (70s, 80s, 90s)</option>
            </optgroup>

            <optgroup label="Brasilidades">
              <option value="Pagode / Samba">Pagode / Samba</option>
              <option value="Sertanejo Universitário">Sertanejo Universitário</option>
              <option value="Piseiro / Forró">Piseiro / Forró</option>
              <option value="Axé / Swingueira">Axé / Swingueira</option>
              <option value="MPB">MPB</option>
            </optgroup>

            <optgroup label="Rock & Alternativo">
              <option value="Rock (Clássico / Hard Rock)">Rock (Clássico / Hard Rock)</option>
              <option value="Indie Rock">Indie Rock</option>
              <option value="Punk / Hardcore">Punk / Hardcore</option>
              <option value="Metal">Metal</option>
              <option value="Reggae">Reggae</option>
            </optgroup>

            <option value="Outro">Outro</option>
          </select>

          <input id="senha_input" type="password" placeholder="Senha: ******" />
          <input id="confirmacao_senha_input" type="password" placeholder="Confirmar senha: ******" />

          <button class="botao" onclick="cadastrar()">CADASTRAR</button>

        </div>

        <p class="link-login">Já tem cadastro? <a href="login.html">Faça login</a></p>
      </div>

      <div class="decoracao-area">
        <img src="./assets/imgs/thee/dj-icon.png" class="estrela-cad" alt="Estrela Decorativa">
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <img class="img-fotter" src="./assets/imgs/thee/set-estrela.png" alt="Logo Footer">
      <h4>&copy; 2026 Set dos DJ's – Esther Santos</h4>
      <div class="div-links">
        <div class="link-titulo">
          <img src="./assets/icon/pasta-icon.png" class="img-icon" alt="Pasta">
          <span>LINKS DE ACESSO</span>
        </div>
        <ul class="footer-list">
          <li><a href="index.html">HOME</a></li>
          <li><a href="interacoes.html">INTERAÇÕES</a></li>
          <li><a href="login.html">LOGIN</a></li>
          <li><a href="cadastro.html">CADASTRO</a></li>
        </ul>
      </div>
    </div>
  </footer>
</body>

<script>
  function cadastrar() {
  const nomeVar = nome_input.value;
  const dtNascVar = dtNasc_input.value;
  const emailVar = email_input.value;
  const senhaVar = senha_input.value;
  const confirmacaoVar = confirmacao_senha_input.value;
  const foto = document.getElementById('ipt_img_usuario');
  const estiloVar = estiloMusical_input.value;

  let campos = [nomeVar, dtNascVar, emailVar, senhaVar, confirmacaoVar];

  for (let i = 0; i < campos.length; i++) {
    if (campos[i] == "") {
      alert("Por favor, preencha todos os campos.");
      return false;
    }
  }

  if (senhaVar !== confirmacaoVar) {
    alert("As senhas não coincidem!");
    return false;
  }

  if (foto.files.length == 0) {
    alert("Por favor, selecione uma foto de perfil.");
    return false;
  }

  if (estiloVar == "") {
    alert("Por favor, selecione seu estilo musical.");
    return false;
  }

  const formData = new FormData();
  formData.append("nomeServer", nomeVar);
  formData.append("dtNascServer", dtNascVar);
  formData.append("emailServer", emailVar);
  formData.append("senhaServer", senhaVar);
  formData.append("estiloServer", estiloVar);
  formData.append("fotoPerfil", foto.files[0]);

  fetch("/usuarios/cadastrar", {
    method: "POST",
    body: formData
  })
    .then(resposta => {
      if (resposta.ok) {
        alert("Cadastro realizado com sucesso! Redirecionando para o login...");
        window.location = "login.html";
      } else {
        alert("Erro ao realizar o cadastro. Verifique os dados ou se o e-mail já existe.");
      }
    })
    .catch(erro => {
      console.error(`#ERRO: ${erro}`);
    });

  return false;
}

  function exibirPreview(event) {
    const input = event.target;
    const preview = document.getElementById('img_preview');

    if (input.files && input.files[0]) {
      const leitor = new FileReader();

      leitor.onload = function (e) {
        preview.src = e.target.result;
      };

      leitor.readAsDataURL(input.files[0]);
    }
  }
</script>

</html>
