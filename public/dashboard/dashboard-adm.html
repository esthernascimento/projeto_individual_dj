<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET DOS DJs | Dashboard</title>

  <link rel="icon" href="../assets/imgs/thee/dj-icon.png">
  <link rel="stylesheet" href="../css/dashboard/dashboad-adm.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <aside class="barra-lateral">
    <div style="height: 50px;"></div>

    <a href="../dashboard/dashboard-adm.html" class="botao-menu">
      <img src="../assets/icon/dash-icon.png" alt="dash">
      DASH
    </a>

    <a href="../dashboard/perfil-adm.html" class="botao-menu">
      <img src="../assets/icon/perfil-icon.png" alt="perfil">
      PERFIL
    </a>

    <a href="../dashboard/visualizar-posts.html" class="botao-menu">
      <img src="../assets/icon/posts-icon.png" alt="perfil">
      POSTS
    </a>

    <div class="logout-container">
      <button class="botao-menu logout" onclick="limparSessao()">SAIR</button>
    </div>
  </aside>

  <main class="area-principal">

    <div class="topo">
      <div class="titulo">
        <h1>DASHBOARD</h1>
        <h2>Olá, <span id="b_usuario"></span>!</h2>
      </div>
      <div class="topo-direito">
        <div class="logo-topo">
          <img src="../assets/imgs/thee/set-estrela.png" alt="Set dos DJs">
        </div>
        <a href="../dashboard/criar-post.html" class="botao-criar">+ CRIAR POST</a>
      </div>
    </div>

    <div class="grade">
      <!-- esquerda -->
      <div class="coluna-esquerda">
        <div class="caixa-grafico">
          <canvas id="grafico-rosca"></canvas>
        </div>

        <div class="caixa-grafico">
          <canvas id="grafico-linha"></canvas>
        </div>
      </div>

      <!-- direita -->
      <div class="coluna-direita">
        <div class="numeros">
          <div class="card-numero">
            <img src="../assets/icon/estrela-icon.png" alt="estrelas">
            <div>
              <div class="numero-valor" id="totalCurtidas"></div> Total de Estrelas

            </div>
          </div>
          <div class="card-numero">
            <img src="../assets/icon/usuarios-icon.png" alt="usuarios">
            <div>
              <div class="numero-valor" id="totalUsuarios"></div> Total de Usuários
            </div>
          </div>
        </div>

        <div class="card-destaque">
          <img src="../assets/icon/pin-icon.png" alt="post">
          <span id="spanDestaque">POST MAIS ENGAJADO</span>
        </div>

        <div class="card-posts">
          <h3>Posts mais recentes</h3>
          <div class="lista-posts">
            <div class="post">
              <div class="post-foto"></div>
              <span class="post-texto">DESCRIÇÃO</span>
            </div>
            <div class="post">
              <div class="post-foto"></div>
              <span class="post-texto">DESCRIÇÃO</span>
            </div>
            <div class="post">
              <div class="post-foto"></div>
              <span class="post-texto">DESCRIÇÃO</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

</body>

</html>
<script src="../js/sessao.js"></script>

<script>
  window.onload = function () {
    validarSessao();
    carregarNumeros();
    carregarGraficoBarras();
    carregarGraficoRoscaInteracoes();
    carregarPostsRecentes();
    carregarPostMaisEngajado();
  };

  function carregarNumeros() {
    fetch("/dashboard/numeros")
      .then(res => res.json())
      .then(data => {
        document.getElementById("totalCurtidas").innerText = data.totalCurtidas;
        document.getElementById("totalUsuarios").innerText = data.totalUsuarios;
      })
      .catch(err => console.error(err));
  }

  function carregarGraficoBarras() {
    fetch("/dashboard/generos")
      .then(res => res.json())
      .then(dados => {
        const labels = dados.map(g => g.estiloMusical);
        const valores = dados.map(g => g.total);

        new Chart(document.getElementById('grafico-rosca'), {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Quantidade de Fãs',
              data: valores,
              // array de cores para cada barra ficar diferente
              backgroundColor: [
                '#6cf76c', '#b040d0', '#471396', '#5DF8D8',
                '#FAE251', '#FF4081', '#e74c3c', '#ecf0f1'
              ]
            }]
          },
          options: {
            scales: {
              y: { beginAtZero: true, ticks: { color: '#ffffff' } },
              x: { ticks: { color: '#ffffff' } }
            },
            plugins: {
              legend: { display: false },
              title: { display: true, text: 'Gêneros Favoritos dos usuáios de acordo com o cadastro', color: '#ffffff' }
            }
          }
        });
      })
      .catch(err => console.error(err));
  }

  function carregarGraficoRoscaInteracoes() {
    fetch("/dashboard/interacoes")
      .then(res => {
        if (!res.ok) {
          throw new Error("Erro na API");
        }
        return res.json();
      })
      .then(dados => {

        console.log("INTERAÇÕES:", dados); // DEBUG pra mim ver

        new Chart(document.getElementById('grafico-linha'), {
          type: 'doughnut',
          data: {
            labels: ['Curtidas', 'Comentários'],
            datasets: [{
              data: [
                Number(dados.curtidas),
                Number(dados.comentarios)
              ],
              backgroundColor: ['#b040d0', '#6cf76c'],
              borderWidth: 0
            }]
          },
          options: {
            plugins: {
              legend: { labels: { color: 'white' } },
              title: { display: true, text: 'Engajamento Total', color: 'white' }
            }
          }
        });

      })
      .catch(err => {
        console.error("ERRO NO GRÁFICO:", err);
      });
  }

function carregarPostsRecentes() {
    fetch("/dashboard/posts-recentes")
      .then(res => {
          if (!res.ok) throw new Error("Erro na requisição");
          return res.json();
      })
      .then(posts => {
        const lista = document.querySelector(".lista-posts");
        lista.innerHTML = "";

        // Verificação de segurança: Só faz o forEach se 'posts' for uma lista
        if (Array.isArray(posts)) {
            posts.forEach(post => {
              lista.innerHTML += `
                <div class="post">
                    <img src="/assets/uploads/${post.imagemPost}" width="40" style="border-radius:5px;">
                    <div>
                        <strong>${post.titulo}</strong> <small class="post-texto">${post.data_post}</small>
                        <br>
                        <span class="post-texto">${post.conteudo}</span>
                    </div>
                </div>
              `;
            });
        } else {
            lista.innerHTML = "Nenhum post encontrado.";
        }
      })
      .catch(err => {
          console.error("Erro ao carregar posts recentes:", err);
          document.querySelector(".lista-posts").innerHTML = "Erro ao carregar dados.";
      });
}

  function carregarPostMaisEngajado() {
    fetch("/dashboard/post-mais-engajado")
      .then(res => {
        if (res.status === 204) {
          document.getElementById("spanDestaque").innerText = "Nenhum post encontrado";
          return null;
        }
        return res.json();
      })
      .then(post => {

        if (!post) return;

        const spanDestaque = document.getElementById("spanDestaque");

        spanDestaque.innerHTML = `
                POST MAIS ENGAJADO: <br>
                <strong>${post.titulo}</strong><br>
                <small>${post.data}</small><br>
                <span style="color:#b040d0; font-size:15px;">
                   ${post.engajamento} interações -
                    ★ ${post.n_curtidas} estrelas e ${post.n_comentarios} comentários
                </span>
            `;
      })
      .catch(err => {
        console.error("Erro ao carregar post:", err);
      });
  }
</script>
